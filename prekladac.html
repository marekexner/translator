<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Překladač</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --text: #111111;
    --muted: #999999;
    --accent: #111111;
    --pill-bg: #f0f0f0;
    --pulse: #111111;
  }

  html, body {
    height: 100%;
    width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    overflow: hidden;
  }

  #app {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 5vh 5vw 160px;
  }

  .header { display: none; }

  /* Mic button */
  .mic-wrap {
    position: fixed;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .pulse-ring {
    position: absolute;
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: 1.5px solid var(--pulse);
    opacity: 0;
    pointer-events: none;
  }
  .pulse-ring.r1 { animation: none; }
  .pulse-ring.r2 { animation: none; animation-delay: 0.4s; }
  .pulse-ring.r3 { animation: none; animation-delay: 0.8s; }

  @keyframes ripple {
    0%   { transform: scale(1);   opacity: 0.5; }
    100% { transform: scale(2.8); opacity: 0; }
  }

  .listening .pulse-ring.r1 { animation: ripple 1.8s ease-out infinite; }
  .listening .pulse-ring.r2 { animation: ripple 1.8s ease-out infinite; animation-delay: 0.5s; }
  .listening .pulse-ring.r3 { animation: ripple 1.8s ease-out infinite; animation-delay: 1s; }

  #micBtn {
    position: relative;
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: 2px solid var(--text);
    background: var(--bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.25s, border-color 0.25s;
    z-index: 1;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  }
  #micBtn:hover { background: #f5f5f5; }
  #micBtn.active {
    background: var(--text);
    border-color: var(--text);
  }
  #micBtn svg { transition: stroke 0.25s, fill 0.25s; }
  #micBtn.active svg path { stroke: #fff; }
  #micBtn.active svg circle { stroke: #fff; }
  #micBtn.active svg rect { stroke: #fff; }
  #micBtn.active svg line { stroke: #fff; }

  /* Spinner inside mic while translating */
  .mic-spinner {
    display: none;
    position: absolute;
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: var(--text);
    animation: spin 0.7s linear infinite;
    pointer-events: none;
  }
  .translating .mic-spinner { display: block; }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .lang-pill { display: none; }

  /* Translation output */
  .output-wrap {
    width: 100%;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #outputText {
    font-family: 'DM Serif Display', serif;
    font-size: 7rem;
    font-weight: 400;
    line-height: 1.25;
    text-align: center;
    color: var(--text);
    width: 100%;
    overflow: hidden;
    transition: opacity 0.15s ease;
  }

  #outputText.empty {
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.9rem, 1.5vw, 1.2rem);
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.08em;
  }

  #outputText.fade-out { opacity: 0; }
  #outputText.fade-in  { opacity: 1; }

  .status { display: none; }
  .hint   { display: none; }

  .error-msg {
    font-size: 0.75rem;
    color: #c00;
    text-align: center;
    max-width: 400px;
    line-height: 1.6;
    font-family: 'DM Mono', monospace;
  }

  /* Quality toggle */
  .quality-toggle {
    position: fixed;
    bottom: 52px;
    right: 32px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    z-index: 10;
  }
  .quality-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .toggle-track {
    width: 40px;
    height: 22px;
    border-radius: 11px;
    border: 1.5px solid var(--text);
    background: var(--bg);
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
  }
  .toggle-track.on { background: var(--text); }
  .toggle-thumb {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--text);
    transition: transform 0.2s, background 0.2s;
  }
  .toggle-track.on .toggle-thumb {
    transform: translateX(18px);
    background: var(--bg);
  }

  /* Language selector */
  .lang-select {
    position: fixed;
    bottom: 52px;
    left: 32px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    z-index: 10;
  }
  .lang-select-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .lang-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--text);
    background: var(--bg);
    border: 1.5px solid var(--text);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
  }
  .lang-btn:hover { background: #f0f0f0; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>Překladač</h1>
  </div>

  <div class="mic-wrap" id="micWrap">
    <div class="pulse-ring r1"></div>
    <div class="pulse-ring r2"></div>
    <div class="pulse-ring r3"></div>
    <div class="mic-spinner"></div>
    <button id="micBtn" title="Stiskni pro nahrávání">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="13" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
  </div>

  <!-- Language selector -->
  <div class="lang-select">
    <span class="lang-select-label" id="langSelectLabel">Jazyk vstupu</span>
    <button class="lang-btn" id="langBtn">CS → EN</button>
  </div>

  <!-- Quality toggle: latency vs quality -->
  <div class="quality-toggle">
    <span class="quality-label" id="qualityLabel">Rychlost</span>
    <div class="toggle-track" id="qualityToggle" title="Přepnout: rychlost / kvalita">
      <div class="toggle-thumb"></div>
    </div>
  </div>

  <div class="output-wrap">
    <div id="outputText" class="empty">Zmáčkni mikrofon, mluv, zmáčkni znovu…</div>
  </div>
</div>

<script>
// ─── State ─────────────────────────────────────────────────────────────────
let recognition        = null;
let isListening        = false;
let accumulatedText    = '';
let isTranslating      = false;
let qualityMode        = false;   // false = latency_optimized, true = quality_optimized
let currentAbortCtrl   = null;    // pro zrušení předchozího fetch
let sourceLang         = 'CS';    // 'CS' nebo 'EN'

const micBtn           = document.getElementById('micBtn');
const micWrap          = document.getElementById('micWrap');
const outputEl         = document.getElementById('outputText');
const qualityToggle    = document.getElementById('qualityToggle');
const qualityLabel     = document.getElementById('qualityLabel');
const langBtn          = document.getElementById('langBtn');
const langSelectLabel  = document.getElementById('langSelectLabel');

// ─── i18n labels ─────────────────────────────────────────────────────────────
const LABELS = {
  CS: { langSelectLabel: 'Jazyk vstupu', speed: 'Rychlost', quality: 'Kvalita', placeholder: 'Zmáčkni mikrofon, mluv, zmáčkni znovu…' },
  EN: { langSelectLabel: 'Input language', speed: 'Speed',   quality: 'Quality', placeholder: 'Press mic, speak, press again…' },
};

function updateLabels() {
  const L = LABELS[sourceLang];
  langSelectLabel.textContent = L.langSelectLabel;
  qualityLabel.textContent    = qualityMode ? L.quality : L.speed;
  if (outputEl.classList.contains('empty')) outputEl.textContent = L.placeholder;
}

// ─── Language selector ───────────────────────────────────────────────────────
langBtn.addEventListener('click', () => {
  if (isListening) return; // nelze měnit za jízdy
  sourceLang = sourceLang === 'CS' ? 'EN' : 'CS';
  langBtn.textContent = sourceLang === 'CS' ? 'CS → EN' : 'EN → CS';
  updateLabels();
});

// ─── Quality toggle ─────────────────────────────────────────────────────────
qualityToggle.addEventListener('click', () => {
  qualityMode = !qualityMode;
  qualityToggle.classList.toggle('on', qualityMode);
  updateLabels();
});

// ─── Dynamic font sizing ─────────────────────────────────────────────────────
const MAX_FONT_PX = 120;
const MIN_FONT_PX = 20;

function fitText() {
  const wrap = outputEl.closest('.output-wrap');
  const availH = wrap.clientHeight - 8;
  outputEl.style.transition = 'none';
  let lo = MIN_FONT_PX, hi = MAX_FONT_PX;
  while (hi - lo > 1) {
    const mid = (lo + hi) >> 1;
    outputEl.style.fontSize = mid + 'px';
    void outputEl.offsetHeight;
    if (outputEl.scrollHeight <= availH) lo = mid; else hi = mid - 1;
  }
  outputEl.style.fontSize = lo + 'px';
}

window.addEventListener('resize', fitText);

// ─── Translation via DeepL ───────────────────────────────────────────────────
async function translate(text) {
  // Zruš případný předchozí in-flight request
  if (currentAbortCtrl) currentAbortCtrl.abort();
  currentAbortCtrl = new AbortController();
  const signal = currentAbortCtrl.signal;

  const targetLang = sourceLang === 'CS' ? 'EN-GB' : 'CS';
  isTranslating = true;
  micWrap.classList.add('translating');

  // Fade out current text
  outputEl.classList.remove('empty');
  outputEl.classList.add('fade-out');

  try {
    const response = await fetch('/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text,
        source_lang: sourceLang,
        target_lang: targetLang,
        model_type: qualityMode ? 'quality_optimized' : 'latency_optimized',
      }),
      signal,
    });

    const data = await response.json();

    if (!response.ok) throw new Error(data.error || 'API chyba');

    const translation = data.translation || '';

    // Fade in new text
    outputEl.classList.remove('fade-out');
    outputEl.style.fontSize = MAX_FONT_PX + 'px';
    outputEl.textContent = translation || '—';
    fitText();
    outputEl.classList.add('fade-in');

  } catch (err) {
    if (err.name === 'AbortError') return; // starý request zrušen, ignoruj
    console.error(err);
    outputEl.classList.remove('fade-out');
    outputEl.innerHTML = `<span class="error-msg">Chyba překladu: ${err.message}</span>`;
    fitText();
  } finally {
    isTranslating = false;
    micWrap.classList.remove('translating');
  }
}

// ─── Flush buffer → překlad ─────────────────────────────────────────────────
function flushAccumulated() {
  const text = accumulatedText.trim();
  accumulatedText = '';
  if (!text) return;
  translate(text);
}

// ─── Process transcript ──────────────────────────────────────────────────────
function processTranscript(text) {
  if (!text.trim()) return;
  accumulatedText += (accumulatedText ? ' ' : '') + text.trim();
}

// ─── Speech Recognition ──────────────────────────────────────────────────────
function setupRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    outputEl.className = 'empty';
    outputEl.textContent = 'Váš prohlížeč nepodporuje rozpoznávání řeči. Zkuste Chrome nebo Edge.';
    micBtn.disabled = true;
    return;
  }

  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = false;
  recognition.lang = sourceLang === 'CS' ? 'cs-CZ' : 'en-US';

  recognition.onstart = () => {
    micBtn.classList.add('active');
    micWrap.classList.add('listening');
  };

  recognition.onresult = (event) => {
    const result = event.results[event.results.length - 1];
    if (result.isFinal) processTranscript(result[0].transcript);
  };

  recognition.onerror = (event) => {
    if (event.error === 'no-speech' || event.error === 'aborted') return;
    console.error('SR error:', event.error);
    stopListening();
  };

  recognition.onend = () => {
    if (isListening) {
      // Nechtěné ukončení – restartuj
      try { recognition.start(); } catch {}
    } else {
      // Uživatel záměrně zastavil – teď jsou všechny výsledky doručeny, přelož
      flushAccumulated();
    }
  };
}

function startListening() {
  if (!recognition) { setupRecognition(); if (!recognition) return; }
  recognition.lang = sourceLang === 'CS' ? 'cs-CZ' : 'en-US';
  isListening = true;
  // Vizuální feedback přidá recognition.onstart – jen když opravdu začne nahrávat
  try { recognition.start(); } catch (e) {
    // Pokud start selže (např. recognition už běží), resetuj stav
    isListening = false;
    console.error('recognition.start() failed:', e);
  }
}

function stopListening() {
  isListening = false;
  micBtn.classList.remove('active');
  micWrap.classList.remove('listening');
  try { recognition.stop(); } catch {}
  // flushAccumulated() se zavolá v recognition.onend – až budou všechny výsledky doručeny
}

micBtn.addEventListener('click', () => {
  isListening ? stopListening() : startListening();
});

// ─── Init ────────────────────────────────────────────────────────────────────
setupRecognition();
</script>
</body>
</html>
